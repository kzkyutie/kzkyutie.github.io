<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Gift For You</title>
    <style>
        :root {
            --bg-color: #f9f3e3;
            --box-main: #550101;
            --box-shade: #3d0000;
            --lid-main: #000000;
            --ribbon: #f9f3e3;
            --txt-color: #333;
        }

        * { box-sizing: border-box; }

        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            background: var(--bg-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: clamp(20px, 4vh, 40px);
            overflow: hidden;
            position: relative;
        }

        /* ---- subtle background decor, same as the letter page ---- */
        .decor {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }
        .decor svg {
            position: absolute;
            opacity: 0.08;
            mix-blend-mode: multiply;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(var(--r, 0deg)); }
            50%      { transform: translateY(-18px) rotate(var(--r, 0deg)); }
        }
        .balloon { animation: float 7s ease-in-out infinite; }

        .heading {
            font-family: "Lucida Handwriting", cursive;
            color: #8b0000;
            text-align: center;
            font-size: clamp(1.8rem, 5vw, 3rem);
            margin: 0;
            position: relative;
            z-index: 1;
        }

        .sub {
            font-family: Georgia, serif;
            color: var(--txt-color);
            text-align: center;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            margin: -20px 0 0;
            position: relative;
            z-index: 1;
        }

        /* ---- gift box ---- */
        .gift-wrapper {
            position: relative;
            z-index: 1;
            width: clamp(180px, 40vw, 280px);
            aspect-ratio: 1 / 0.95;
            perspective: 1000px;
            cursor: pointer;
        }

        .box-base {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 62%;
            background: var(--box-main);
            border-radius: 4px;
            box-shadow: 0 18px 30px rgba(0,0,0,0.25);
        }

        .box-base::before {
            /* vertical ribbon on the base */
            content: "";
            position: absolute;
            top: 0; bottom: 0; left: 50%;
            width: 16%;
            transform: translateX(-50%);
            background: var(--ribbon);
        }

        .lid {
            position: absolute;
            top: 30%;
            left: -4%;
            width: 108%;
            height: 24%;
            background: var(--lid-main);
            border-radius: 4px;
            transform-origin: bottom center;
            transition: transform 0.9s cubic-bezier(.6,-0.28,.74,.05);
            box-shadow: 0 8px 16px rgba(0,0,0,0.25);
            z-index: 2;
        }

        .lid::before {
            content: "";
            position: absolute;
            top: 0; bottom: 0; left: 50%;
            width: 15%;
            transform: translateX(-50%);
            background: var(--ribbon);
        }

        .bow {
            position: absolute;
            top: 20%;
            left: 50%;
            width: 46%;
            transform: translateX(-50%);
            z-index: 3;
            transition: transform 0.9s cubic-bezier(.6,-0.28,.74,.05), opacity 0.4s ease 0.2s;
            transform-origin: bottom center;
        }

        .glow {
            position: absolute;
            top: 20%;
            left: 50%;
            width: 10%;
            height: 10%;
            transform: translate(-50%, -50%) scale(0);
            background: radial-gradient(circle, rgba(255,240,200,0.9) 0%, rgba(255,240,200,0) 70%);
            border-radius: 50%;
            z-index: 4;
            transition: transform 0.6s ease-out, opacity 0.6s ease-out;
            opacity: 0;
        }

        .gift-wrapper.open .lid {
            transform: rotateX(-115deg) translateY(4px);
        }
        .gift-wrapper.open .bow {
            transform: translateX(-50%) translateY(-30px) rotate(-15deg);
            opacity: 0;
        }
        .gift-wrapper.open .glow {
            transform: translate(-50%, -50%) scale(8);
            opacity: 1;
        }
        .gift-wrapper.open .box-base {
            box-shadow: 0 24px 40px rgba(0,0,0,0.3);
        }

        .hint {
            font-family: Georgia, serif;
            color: #8b0000;
            font-size: clamp(0.8rem, 1.8vw, 0.95rem);
            opacity: 0.75;
            text-align: center;
            position: relative;
            z-index: 1;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.9; }
        }

        .transition-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            pointer-events: none;
            background: radial-gradient(circle at var(--ox, 50%) var(--oy, 50%),
                #fff6da 0%, #ffe9b8 25%, #f9f3e3 55%, #f9f3e3 100%);
            clip-path: circle(0% at var(--ox, 50%) var(--oy, 50%));
            transition: clip-path 1.1s cubic-bezier(.45, 0, .2, 1);
        }
        .transition-overlay.active {
            clip-path: circle(150% at var(--ox, 50%) var(--oy, 50%));
        }

        .sparkle {
            position: fixed;
            top: var(--oy, 50%);
            left: var(--ox, 50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #fff2c8;
            box-shadow: 0 0 8px 2px #ffe9b8;
            z-index: 51;
            pointer-events: none;
            opacity: 0;
            transform: translate(-50%, -50%);
        }
        .sparkle.fly {
            transition: transform 1s cubic-bezier(.2,.6,.3,1), opacity 1s ease-out;
            transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.3);
            opacity: 0;
        }
    </style>
</head>
<body>

    <div class="transition-overlay" id="overlay"></div>

    <div class="decor" aria-hidden="true">
        <svg class="balloon" style="top:5%; left:8%; width:90px; --r:-6deg; animation-delay:0s;" viewBox="0 0 100 140">
            <ellipse cx="50" cy="55" rx="42" ry="52" fill="#550101"/>
            <polygon points="42,104 58,104 50,116" fill="#550101"/>
            <path d="M50,116 C40,130 60,132 50,140" stroke="#333" stroke-width="1.5" fill="none"/>
        </svg>
        <svg class="balloon" style="top:10%; right:8%; width:70px; --r:5deg; animation-delay:1.5s;" viewBox="0 0 100 140">
            <ellipse cx="50" cy="55" rx="42" ry="52" fill="#000000"/>
            <polygon points="42,104 58,104 50,116" fill="#000000"/>
            <path d="M50,116 C60,130 40,132 50,140" stroke="#333" stroke-width="1.5" fill="none"/>
        </svg>
        <svg class="balloon" style="bottom:8%; left:10%; width:75px; --r:4deg; animation-delay:0.8s;" viewBox="0 0 100 140">
            <ellipse cx="50" cy="55" rx="42" ry="52" fill="#550101"/>
            <polygon points="42,104 58,104 50,116" fill="#550101"/>
            <path d="M50,116 C40,130 60,132 50,140" stroke="#333" stroke-width="1.5" fill="none"/>
        </svg>
        <svg class="balloon" style="bottom:14%; right:12%; width:65px; --r:-5deg; animation-delay:2.7s;" viewBox="0 0 100 140">
            <ellipse cx="50" cy="55" rx="42" ry="52" fill="#000000"/>
            <polygon points="42,104 58,104 50,116" fill="#000000"/>
            <path d="M50,116 C60,130 40,132 50,140" stroke="#333" stroke-width="1.5" fill="none"/>
        </svg>
    </div>

    <h1 class="heading">Happy 21st Bebi</h1>
    <p class="sub">Tap the box for something special</p>

    <div class="gift-wrapper" id="giftBox">
        <div class="glow"></div>
        <svg class="bow" viewBox="0 0 100 60">
            <circle cx="30" cy="30" r="24" fill="var(--box-main)"/>
            <circle cx="70" cy="30" r="24" fill="var(--box-main)"/>
            <circle cx="50" cy="30" r="12" fill="#3d0000"/>
        </svg>
        <div class="lid"></div>
        <div class="box-base"></div>
    </div>

    <p class="hint">click / tap</p>

    <script>
        const box = document.getElementById('giftBox');
        const overlay = document.getElementById('overlay');
        let opened = false;

        box.addEventListener('click', () => {
            if (opened) return;
            opened = true;
            box.classList.add('open');

            const rect = box.getBoundingClientRect();
            const ox = rect.left + rect.width / 2;
            const oy = rect.top + rect.height * 0.35;
            document.documentElement.style.setProperty('--ox', ox + 'px');
            document.documentElement.style.setProperty('--oy', oy + 'px');

            setTimeout(() => {
                overlay.classList.add('active');
                spawnSparkles(ox, oy);
            }, 500);

            setTimeout(() => {
                window.location.href = 'happy-birthday.html';
            }, 1650);
        });

        function spawnSparkles(ox, oy) {
            const count = 14;
            for (let i = 0; i < count; i++) {
                const s = document.createElement('div');
                s.className = 'sparkle';
                s.style.setProperty('--ox', ox + 'px');
                s.style.setProperty('--oy', oy + 'px');
                const angle = (Math.PI * 2 * i) / count + Math.random() * 0.3;
                const dist = 120 + Math.random() * 140;
                s.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
                s.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
                document.body.appendChild(s);
                requestAnimationFrame(() => {
                    s.style.opacity = '1';
                    requestAnimationFrame(() => s.classList.add('fly'));
                });
                setTimeout(() => s.remove(), 1200);
            }
        }
    </script>
</body>
</html>
